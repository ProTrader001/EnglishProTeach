<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Lingua Path — Ingliz tilini o'rganish</title>
<meta name="description" content="0 dan C1 darajagacha ingliz tilini o'rganish platformasi">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" onerror="this.remove()">
<style>
/* ==========================================================================
   LINGUA PATH — DESIGN TOKENS
   Palette: deep indigo (focus/trust) + amber flame (streak/achievement)
   Display: Fraunces (characterful serif) / Body: Inter / Data: JetBrains Mono
   ========================================================================== */
:root{
  --bg:#F5F6FB;
  --surface:#FFFFFF;
  --surface-2:#EEF0F9;
  --border:#E1E4F0;
  --text:#1B1D2E;
  --muted:#6A6F8C;
  --primary:#2D3282;
  --primary-2:#454BB0;
  --primary-soft:#E9EAFA;
  --accent:#FF9F1C;
  --accent-soft:#FFEED2;
  --success:#0AA37A;
  --success-soft:#DCF6EE;
  --danger:#E24C5B;
  --danger-soft:#FBE3E6;
  --radius:16px;
  --radius-sm:10px;
  --shadow:0 8px 24px -8px rgba(29,32,66,.14);
  --shadow-lg:0 20px 48px -12px rgba(29,32,66,.22);
  --font-display:'Fraunces', Georgia, serif;
  --font-body:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono:'JetBrains Mono', 'Courier New', monospace;
  --sidebar-w:264px;
  color-scheme: light;
}
body.dark{
  --bg:#0F1120;
  --surface:#181B30;
  --surface-2:#1F2340;
  --border:#2B2F52;
  --text:#EDEEFA;
  --muted:#9498BD;
  --primary:#7A80E8;
  --primary-2:#9498F5;
  --primary-soft:#232760;
  --accent:#FFB54D;
  --accent-soft:#3A2C10;
  --success:#3FD9A8;
  --success-soft:#123829;
  --danger:#FF7A88;
  --danger-soft:#3B1620;
  color-scheme: dark;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition:background .3s ease,color .3s ease;
  -webkit-font-smoothing:antialiased;
}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:inherit}
a{color:inherit}
::selection{background:var(--accent-soft);color:var(--text)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.hidden{display:none !important}
.scrollbar-thin::-webkit-scrollbar{width:8px;height:8px}
.scrollbar-thin::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}

/* ---------- App shell ---------- */
.app-shell{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{
  width:var(--sidebar-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;
  z-index:100;
  transition:transform .3s ease, background .3s ease;
}
.sidebar-brand{
  display:flex;align-items:center;gap:10px;
  padding:22px 20px 16px;
}
.sidebar-brand .flame{
  width:38px;height:38px;border-radius:11px;
  background:linear-gradient(150deg,var(--accent),#FF6B35);
  display:flex;align-items:center;justify-content:center;
  font-size:19px;box-shadow:0 6px 16px -4px rgba(255,159,28,.55);
  flex-shrink:0;
}
.sidebar-brand h1{font-family:var(--font-display);font-size:19px;font-weight:700;letter-spacing:-.01em}
.sidebar-brand span{display:block;font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.02em}
.sidebar-nav{flex:1;overflow-y:auto;padding:6px 12px 12px}
.nav-group-label{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);padding:16px 10px 6px}
.nav-item{
  display:flex;align-items:center;gap:12px;
  width:100%;padding:10px 12px;border-radius:11px;
  font-size:14px;font-weight:600;color:var(--muted);
  transition:all .15s ease;text-align:left;
}
.nav-item .ic{font-size:17px;width:20px;text-align:center;flex-shrink:0}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--primary-soft);color:var(--primary)}
body.dark .nav-item.active{color:#C7CAFF}
.sidebar-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.streak-chip{display:flex;align-items:center;gap:6px;font-weight:700;font-size:13px;font-family:var(--font-mono)}

/* Topbar (mobile) */
.topbar{
  display:none;position:sticky;top:0;z-index:90;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:12px 14px;align-items:center;justify-content:space-between;
}
.icon-btn{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--surface-2)}
.icon-btn:hover{background:var(--border)}

/* Main content */
.main-wrap{margin-left:var(--sidebar-w);flex:1;min-width:0;display:flex;flex-direction:column}
.main-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 32px;border-bottom:1px solid var(--border);
  background:var(--surface);position:sticky;top:0;z-index:50;
}
.main-header h2{font-family:var(--font-display);font-size:26px;font-weight:700;letter-spacing:-.01em}
.main-header p{font-size:13px;color:var(--muted);margin-top:2px}
.header-actions{display:flex;gap:10px;align-items:center}
.main-content{padding:28px 32px 80px;max-width:1180px;width:100%}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 20px;border-radius:12px;font-weight:700;font-size:14px;
  transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
  white-space:nowrap;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 8px 20px -8px rgba(45,50,130,.55)}
.btn-primary:hover{background:var(--primary-2)}
.btn-accent{background:var(--accent);color:#241300;box-shadow:0 8px 20px -8px rgba(255,159,28,.55)}
.btn-accent:hover{filter:brightness(1.06)}
.btn-ghost{background:var(--surface-2);color:var(--text)}
.btn-ghost:hover{background:var(--border)}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:7px 13px;font-size:12.5px;border-radius:9px}
.btn-danger{background:var(--danger-soft);color:var(--danger)}
.btn[disabled]{opacity:.45;pointer-events:none}
.btn-icon-only{padding:9px;border-radius:10px}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:background .3s ease, border-color .3s ease}
.card-hover:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1000px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}

/* Dashboard */
.hero-path{
  background:linear-gradient(135deg,var(--primary) 0%, #4247A8 55%, #5A5FC7 100%);
  border-radius:20px;padding:28px 30px;color:#fff;position:relative;overflow:hidden;margin-bottom:22px;
}
.hero-path::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 85% 20%, rgba(255,159,28,.35), transparent 55%);
}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;position:relative;flex-wrap:wrap}
.hero-top h3{font-family:var(--font-display);font-size:24px;font-weight:700}
.hero-top p{font-size:13.5px;opacity:.85;margin-top:4px;max-width:420px}
.hero-stat{text-align:right}
.hero-stat b{font-family:var(--font-mono);font-size:28px;display:block;line-height:1}
.hero-stat span{font-size:11px;opacity:.8;text-transform:uppercase;letter-spacing:.06em}
.level-trail{display:flex;align-items:center;gap:4px;margin-top:26px;position:relative;overflow-x:auto;padding-bottom:6px}
.trail-node{
  display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;min-width:74px;position:relative;
}
.trail-dot{
  width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-weight:700;font-size:13px;border:3px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.08);transition:all .2s ease;
}
.trail-node.done .trail-dot{background:var(--success);border-color:#fff}
.trail-node.current .trail-dot{background:var(--accent);border-color:#fff;color:#241300;box-shadow:0 0 0 6px rgba(255,159,28,.28);animation:pulseGlow 2s infinite}
.trail-node.locked .trail-dot{opacity:.5}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 6px rgba(255,159,28,.28)}50%{box-shadow:0 0 0 10px rgba(255,159,28,.12)}}
.trail-node span{font-size:11px;font-weight:600;opacity:.85}
.trail-line{position:absolute;top:23px;left:50%;width:100%;height:3px;background:rgba(255,255,255,.22);z-index:-1}
.trail-node:last-child .trail-line{display:none}
.trail-node.done .trail-line{background:var(--success)}

.stat-card{display:flex;flex-direction:column;gap:8px}
.stat-card .top{display:flex;justify-content:space-between;align-items:center}
.stat-card .ic-badge{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px}
.stat-card b{font-family:var(--font-mono);font-size:26px}
.stat-card .lbl{font-size:12.5px;color:var(--muted);font-weight:600}
.progress-bar{height:8px;border-radius:6px;background:var(--surface-2);overflow:hidden}
.progress-bar > i{display:block;height:100%;background:var(--accent);border-radius:6px;transition:width .4s ease}

.section-title{font-family:var(--font-display);font-size:19px;font-weight:700;margin:26px 0 12px;display:flex;align-items:center;gap:8px}
.section-title:first-child{margin-top:0}

/* Chart canvas card */
.chart-card canvas{width:100%!important;height:180px!important}

/* Badges/pills */
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;font-size:11.5px;font-weight:700}
.pill-primary{background:var(--primary-soft);color:var(--primary)}
body.dark .pill-primary{color:#C7CAFF}
.pill-success{background:var(--success-soft);color:var(--success)}
.pill-accent{background:var(--accent-soft);color:#B05E00}
body.dark .pill-accent{color:var(--accent)}
.pill-danger{background:var(--danger-soft);color:var(--danger)}

/* Level cards */
.level-card{position:relative;text-align:center;padding:26px 16px}
.level-card .badge-num{font-family:var(--font-display);font-size:34px;font-weight:900;color:var(--primary)}
.level-card.locked{opacity:.55}
.level-card .lock-ic{position:absolute;top:14px;right:14px;font-size:16px}

/* Alphabet */
.letter-card{text-align:center;padding:18px 10px;cursor:pointer}
.letter-card .big{font-family:var(--font-display);font-size:34px;font-weight:800;color:var(--primary)}
.letter-card .ipa{font-family:var(--font-mono);font-size:12px;color:var(--muted);margin-top:2px}
.letter-card .ex{font-size:12px;margin-top:6px;color:var(--muted)}

/* Vocabulary */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip-filter{padding:8px 14px;border-radius:99px;background:var(--surface-2);font-size:13px;font-weight:600;color:var(--muted);border:1.5px solid transparent}
.chip-filter.active{background:var(--primary);color:#fff}
.search-input{width:100%;padding:12px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface);font-size:14px}
.word-card{display:flex;flex-direction:column;gap:8px}
.word-card .wtop{display:flex;justify-content:space-between;align-items:flex-start}
.word-card .en{font-family:var(--font-display);font-weight:700;font-size:19px}
.word-card .ipa{font-family:var(--font-mono);color:var(--muted);font-size:12px}
.word-card .uz{color:var(--primary);font-weight:600;font-size:14px}
.word-card .ex{font-size:12.5px;color:var(--muted);font-style:italic;border-left:2px solid var(--border);padding-left:8px;margin-top:2px}
.word-actions{display:flex;gap:6px;margin-top:6px}

/* Grammar */
.gtopic-card{cursor:pointer}
.gtopic-card .top-row{display:flex;justify-content:space-between;align-items:center}
table.gtable{width:100%;border-collapse:collapse;margin:12px 0;font-size:13.5px}
table.gtable th,table.gtable td{border:1px solid var(--border);padding:8px 10px;text-align:left}
table.gtable th{background:var(--surface-2);font-weight:700}
.ex-line{background:var(--surface-2);border-radius:10px;padding:10px 14px;font-size:13.5px;margin:6px 0}
.exercise-block{margin-top:16px;padding:16px;border-radius:14px;background:var(--surface-2)}
.fill-input{border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13.5px;width:120px;background:var(--surface);margin:0 4px}
.fill-input.correct{border-color:var(--success);background:var(--success-soft)}
.fill-input.wrong{border-color:var(--danger);background:var(--danger-soft)}

/* Speaking / listening / mic */
.mic-btn{
  width:96px;height:96px;border-radius:50%;background:var(--danger);color:#fff;font-size:34px;
  display:flex;align-items:center;justify-content:center;margin:20px auto;box-shadow:0 12px 30px -10px rgba(226,76,91,.6);
  transition:all .2s ease;
}
.mic-btn.listening{animation:micPulse 1.2s infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(226,76,91,.5)}50%{box-shadow:0 0 0 22px rgba(226,76,91,0)}}
.result-box{border-radius:14px;padding:16px;margin-top:14px}
.score-ring{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;font-family:var(--font-mono);font-weight:800;font-size:26px;position:relative}

/* Flashcards */
.flash-stage{perspective:1400px;max-width:420px;margin:0 auto}
.flash-card{position:relative;width:100%;height:260px;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.2,.2,1);cursor:pointer}
.flash-card.flipped{transform:rotateY(180deg)}
.flash-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;text-align:center;box-shadow:var(--shadow)}
.flash-front{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff}
.flash-back{background:var(--accent);color:#241300;transform:rotateY(180deg)}
.flash-face .big{font-family:var(--font-display);font-size:28px;font-weight:800}

/* Quiz */
.quiz-opt{display:block;width:100%;text-align:left;padding:13px 16px;border-radius:12px;border:1.5px solid var(--border);margin-bottom:9px;font-weight:600;font-size:14px;transition:all .15s ease}
.quiz-opt:hover{border-color:var(--primary)}
.quiz-opt.selected{border-color:var(--primary);background:var(--primary-soft)}
.quiz-opt.correct{border-color:var(--success);background:var(--success-soft)}
.quiz-opt.wrong{border-color:var(--danger);background:var(--danger-soft)}
.quiz-progress{height:6px;border-radius:6px;background:var(--surface-2);overflow:hidden;margin-bottom:18px}

/* Chat */
.chat-window{height:440px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:6px}
.msg{max-width:78%;padding:11px 15px;border-radius:16px;font-size:14px;line-height:1.5}
.msg.bot{background:var(--surface-2);align-self:flex-start;border-bottom-left-radius:4px}
.msg.user{background:var(--primary);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-input-row{display:flex;gap:8px;margin-top:14px}
.chat-input-row input{flex:1;padding:13px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface)}

/* Games */
.hangman-word{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:20px 0;font-family:var(--font-mono);font-size:28px;font-weight:700}
.hangman-word span{border-bottom:3px solid var(--border);min-width:26px;text-align:center}
.kbd-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:520px;margin:0 auto}
.kbd-key{width:36px;height:40px;border-radius:8px;background:var(--surface-2);font-weight:700;display:flex;align-items:center;justify-content:center}
.kbd-key.used-good{background:var(--success-soft);color:var(--success)}
.kbd-key.used-bad{background:var(--danger-soft);color:var(--danger);opacity:.5}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:480px;margin:0 auto}
.memory-tile{aspect-ratio:1;border-radius:12px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;text-align:center;padding:4px;color:#fff;cursor:pointer;transition:transform .3s}
.memory-tile.revealed{background:var(--surface-2);color:var(--text)}
.memory-tile.matched{background:var(--success-soft);color:var(--success);opacity:.7}
.sentence-pool{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0;min-height:44px;padding:10px;border:1.5px dashed var(--border);border-radius:12px}
.sentence-chip{padding:8px 14px;background:var(--primary-soft);color:var(--primary);border-radius:9px;font-weight:700;font-size:13.5px;cursor:pointer}
body.dark .sentence-chip{color:#C7CAFF}
.sentence-answer{display:flex;flex-wrap:wrap;gap:8px;min-height:50px;padding:10px;background:var(--surface-2);border-radius:12px;margin-bottom:10px}

/* Notebook */
.note-item{border-left:3px solid var(--accent);padding-left:12px}

/* Conversation */
.dialogue-line{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start}
.dialogue-line .avatar{width:34px;height:34px;border-radius:50%;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.dialogue-line.me{flex-direction:row-reverse}
.dialogue-line.me .bubble{background:var(--primary);color:#fff}
.bubble{background:var(--surface-2);padding:10px 14px;border-radius:14px;font-size:14px;max-width:75%}

/* Toast */
#toast-wrap{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--text);color:var(--bg);padding:13px 18px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);animation:toastIn .3s ease;max-width:300px}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(10,11,20,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal-box{background:var(--surface);border-radius:20px;padding:26px;max-width:480px;width:100%;max-height:86vh;overflow-y:auto;box-shadow:var(--shadow-lg)}

/* empty state */
.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-state .ic{font-size:42px;margin-bottom:10px}

/* Mobile nav drawer */
.sidebar-scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}

@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-scrim.show{display:block}
  .main-wrap{margin-left:0}
  .topbar{display:flex}
  .main-header{padding:16px 18px}
  .main-header h2{font-size:20px}
  .main-content{padding:18px 16px 70px}
  .hero-path{padding:20px}
}
</style>
</head>
<body>
<div id="toast-wrap"></div>

<div class="app-shell">
  <div class="sidebar-scrim" id="scrim" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="flame">🔥</div>
      <div>
        <h1>Lingua Path</h1>
        <span>0 → C1 yo'lida</span>
      </div>
    </div>
    <nav class="sidebar-nav scrollbar-thin" id="navList"></nav>
    <div class="sidebar-foot">
      <div class="streak-chip"><span>🔥</span><span id="sideStreak">0</span></div>
      <button class="icon-btn" id="themeToggle" onclick="toggleTheme()" title="Mavzuni almashtirish">🌙</button>
    </div>
  </aside>

  <div class="main-wrap">
    <div class="topbar">
      <button class="icon-btn" onclick="openSidebar()">☰</button>
      <h1 style="font-family:var(--font-display);font-size:17px;font-weight:700">Lingua Path</h1>
      <button class="icon-btn" onclick="toggleTheme()">🌙</button>
    </div>

    <header class="main-header">

const STORAGE_KEY = 'linguaPathState_v1';

function defaultState(){
  return {
    theme: 'light',
    xp: 0,
    streak: 0,
    lastActiveDate: null,
    dailyGoalWords: 10,
    levels: ['A0','A1','A2','B1','B2','C1'],
    unlockedIndex: 0, // index into levels array, current unlocked max
    currentLevel: 'A0',
    learnedWords: {},      // wordId -> true
    favoriteWords: {},      // wordId -> true
    notebook: [],            // {id, wordId, en, uz, note, cat, date}
    completedLessons: {},   // lessonId -> true
    grammarScores: {},       // topicId -> {score,total,date}
    quizHistory: [],         // {type,score,total,date}
    skillScores: { speaking:[], listening:[], grammar:[], vocabulary:[], reading:[], writing:[] },
    dailyLog: {},            // 'YYYY-MM-DD' -> {words:0, xp:0, minutes:0}
    flashcardSR: {},         // wordId -> {interval, nextReview, ease, reps}
    dailyChallengeDate: null,
    dailyChallengeDone: false,
    lastConversationScenario: null,
  };
}

let STATE = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  }catch(e){
    console.warn('State load failed, using defaults', e);
    return defaultState();
  }
}
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
  }catch(e){
    console.warn('State save failed', e);
    showToast('⚠️ Ma\'lumotni saqlashda xatolik yuz berdi');
  }
}

function todayStr(){ const d = new Date(); return d.toISOString().slice(0,10); }

function $(sel, ctx){ return (ctx||document).querySelector(sel); }
function $all(sel, ctx){ return Array.from((ctx||document).querySelectorAll(sel)); }

function showToast(msg, ms){
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, ms||2600);
}

function addXP(amount, reason){
  STATE.xp += amount;
  const d = todayStr();
  if(!STATE.dailyLog[d]) STATE.dailyLog[d] = {words:0,xp:0,minutes:0};
  STATE.dailyLog[d].xp += amount;
  touchStreak();
  saveState();
  updateHeaderStats();
  if(reason) showToast('⭐ +'+amount+' XP — '+reason);
}

function touchStreak(){
  const d = todayStr();
  if(STATE.lastActiveDate === d) return;
  const y = new Date(); y.setDate(y.getDate()-1);
  const yStr = y.toISOString().slice(0,10);
  if(STATE.lastActiveDate === yStr){ STATE.streak += 1; }
  else if(STATE.lastActiveDate !== d){ STATE.streak = 1; }
  STATE.lastActiveDate = d;
  saveState();
}

function markWordLearned(wordId){
  if(!STATE.learnedWords[wordId]){
    STATE.learnedWords[wordId] = true;
    const d = todayStr();
    if(!STATE.dailyLog[d]) STATE.dailyLog[d] = {words:0,xp:0,minutes:0};
    STATE.dailyLog[d].words += 1;
    addXP(5,'yangi so\'z o\'rganildi');
  }
  saveState();
}

function toggleFavorite(wordId){
  if(STATE.favoriteWords[wordId]) delete STATE.favoriteWords[wordId];
  else STATE.favoriteWords[wordId] = true;
  saveState();
}

/* ---------------------------- Speech helpers ---------------------------- */
function speak(text, lang){
  try{
    if(!('speechSynthesis' in window)){ showToast('Bu brauzerda audio (TTS) qo\'llab-quvvatlanmaydi'); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang || 'en-US';
    u.rate = 0.92;
    window.speechSynthesis.speak(u);
  }catch(e){ console.warn('speak failed',e); }
}

function getRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return null;
  const r = new SR();
  r.lang = 'en-US';
  r.interimResults = false;
  r.maxAlternatives = 3;
  return r;
}

function levenshtein(a,b){
  a=a.toLowerCase().trim(); b=b.toLowerCase().trim();
  const m=a.length,n=b.length;
  const dp = Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=0;i<=m;i++) dp[i][0]=i;
  for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}
function similarityPct(a,b){
  const dist = levenshtein(a,b);
  const maxLen = Math.max(a.length,b.length,1);
  return Math.max(0, Math.round((1 - dist/maxLen)*100));
}

/* Rough phonetic respelling (approximate, audio button is the source of truth) */
function respell(word){
  let w = word.toLowerCase();
  const rules = [
    [/tion$/, 'shn'],[/sion$/,'zhn'],[/ough/,'af'],[/augh/,'af'],
    [/ph/g,'f'],[/th/g,'th'],[/ch/g,'ch'],[/sh/g,'sh'],
    [/ee/g,'iy'],[/oo/g,'uw'],[/ea/g,'iy'],[/ai/g,'ey'],[/ay/g,'ey'],
    [/oa/g,'ow'],[/igh/g,'ay'],[/qu/g,'kw'],[/ck/g,'k'],[/x/g,'ks'],
    [/^y/,'y'],[/y$/,'iy'],[/e$/,'']
  ];
  rules.forEach(([re,rep])=>{ w = w.replace(re,rep); });
  return w;
}

function last7DaysData(){
  const out = [];
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    const log = STATE.dailyLog[key] || {words:0};
    out.push({label: d.toLocaleDateString('uz-UZ',{weekday:'short'}), value: log.words});
  }
  return out;
}
function last30DaysData(){
  const out = [];
  for(let i=29;i>=0;i-=3){
    const d = new Date(); d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    const log = STATE.dailyLog[key] || {words:0};
    out.push({label: (d.getMonth()+1)+'/'+d.getDate(), value: log.words});
  }
  return out;
}

/* Minimal canvas bar chart (no external library => fully offline) */
function drawBarChart(canvasId, data){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth || 600, h = 180;
  canvas.width = w*dpr; canvas.height = h*dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  const isDark = STATE.theme==='dark';
  const max = Math.max(1, ...data.map(d=>d.value));
  const padL=30, padB=24, barGap=8;
  const chartW = w - padL - 10;
  const barW = chartW/data.length - barGap;
  ctx.strokeStyle = isDark ? '#2B2F52' : '#E1E4F0';
  ctx.beginPath();
  for(let i=0;i<=4;i++){
    const y = 10 + (h-padB-10)*(i/4);
    ctx.moveTo(padL,y); ctx.lineTo(w,y);
  }
  ctx.stroke();
  data.forEach((d,i)=>{
    const x = padL + i*(barW+barGap);
    const barH = (d.value/max) * (h-padB-14);
    const y = h-padB-barH;
    const grad = ctx.createLinearGradient(0,y,0,h-padB);
    grad.addColorStop(0,'#FF9F1C'); grad.addColorStop(1,'#FF6B35');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(x,y,barW,barH,4) : ctx.rect(x,y,barW,barH);
    ctx.fill();
    ctx.fillStyle = isDark ? '#9498BD' : '#6A6F8C';
    ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(d.label, x+barW/2, h-8);
  });
}

          : `<button class="btn ${done?'btn-outline':'btn-primary'} btn-sm" onclick="startLevelTest('${lv}', ${i})">${done?"Testni qayta topshirish":"Bosqich testi"}</button>`
        }
      </div>`;
  }).join('');
};

function startLevelTest(level, idx){
  // Build a quick 8-question test mixing vocab + grammar for that level
  const gramForLevel = GRAMMAR.filter(g=>g.level===level);
  let qs = [];
  gramForLevel.forEach(g=> g.quiz.forEach(q=> qs.push({q:q.q, options:q.options, correct:q.correct, topic:g.title})));
  // pad with vocab translation questions
  const catWords = shuffleArr(VOCAB.slice()).slice(0,6);
  catWords.forEach(w=>{
    const wrongs = shuffleArr(VOCAB.filter(v=>v.id!==w.id)).slice(0,2).map(v=>v.uz);
    const options = shuffleArr([w.uz, ...wrongs]);
    qs.push({q:`"${w.en}" so'zining tarjimasi qaysi?`, options, correct: options.indexOf(w.uz), topic:'Vocabulary'});
  });
  qs = shuffleArr(qs).slice(0,8);
  if(qs.length===0){ showToast('Bu daraja uchun test mavjud emas, avtomatik ochildi.'); unlockNextLevel(idx); return; }
  runGenericQuiz(qs, 'Level Test — '+level, (score,total)=>{
    const pct = Math.round((score/total)*100);
    STATE.grammarScores['level_'+level] = {score,total,date:todayStr()};
    saveState();
    if(pct>=70){
      showToast('🎉 Test muvaffaqiyatli! '+pct+'%');
      unlockNextLevel(idx);
    } else {
      showToast('Ball: '+pct+'%. Kamida 70% kerak, qayta urinib ko\'ring.');
    }
  });
}
function unlockNextLevel(idx){
  if(idx >= STATE.unlockedIndex){
    STATE.unlockedIndex = Math.min(idx+1, STATE.levels.length-1);
    STATE.currentLevel = STATE.levels[STATE.unlockedIndex];
    addXP(50, level+' bosqichi ochildi');
  }
  saveState();
  navigate('levels');
}
function shuffleArr(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* ---------------------------- GENERIC QUIZ RUNNER (used everywhere) ---------------------------- */
function runGenericQuiz(questions, title, onFinish){
  let idx = 0, score = 0, selected = null;
  const main = document.getElementById('mainContent');
  function render(){
    if(idx >= questions.length){
      main.innerHTML = `
        <div class="card" style="text-align:center;padding:40px">
          <div style="font-size:44px">${score/questions.length>=0.7?'🎉':'📘'}</div>
          <h2 style="font-family:var(--font-display);margin:10px 0">${title} — Natija</h2>
          <p style="font-size:32px;font-weight:800;font-family:var(--font-mono);color:var(--primary)">${score}/${questions.length}</p>
          <button class="btn btn-primary" style="margin-top:16px" onclick="(${onFinish?onFinish.toString():'function(){}'})(${score},${questions.length}); navigate(currentPage);">Davom etish</button>
        </div>`;
      return;
    }
    const q = questions[idx];
    main.innerHTML = `
      <div class="card">
        <div class="quiz-progress"><i style="display:block;height:100%;width:${(idx/questions.length)*100}%;background:var(--primary)"></i></div>
        <p style="font-size:12px;color:var(--muted);font-weight:700">SAVOL ${idx+1} / ${questions.length}</p>
        <h3 style="font-family:var(--font-display);font-size:19px;margin:10px 0 18px">${q.q}</h3>
        <div id="quizOpts">${q.options.map((o,i)=>`<button class="quiz-opt" data-i="${i}" onclick="selectQuizOpt(${i})">${o}</button>`).join('')}</div>
        <button class="btn btn-primary" id="quizNextBtn" style="margin-top:12px" disabled onclick="quizNext()">Keyingisi →</button>
      </div>`;
  }
  window.selectQuizOpt = function(i){
    if(selected!==null) return;
    selected = i;
    const opts = $all('#quizOpts .quiz-opt');
    opts.forEach((el,j)=>{
      el.classList.toggle('selected', j===i);
      if(j===questions[idx].correct) el.classList.add('correct');
      else if(j===i) el.classList.add('wrong');
    });
    if(i===questions[idx].correct) score++;
    document.getElementById('quizNextBtn').disabled = false;
  };
  window.quizNext = function(){ idx++; selected=null; render(); };
  render();
}

function startSpeakingCheck(target){
  const rec = getRecognition();
  const micBtn = document.getElementById('micBtn');
  const resultBox = document.getElementById('speakResult');
  if(!rec){
    resultBox.innerHTML = `<div class="result-box" style="background:var(--danger-soft)">Bu brauzerda ovozni tanish (Speech Recognition) qo'llab-quvvatlanmaydi. Iltimos Google Chrome'dan foydalaning yoki matn kiriting: <br><input class="search-input" style="margin-top:8px" id="manualSpeak" placeholder="Aytganingizni yozing..."><button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="evalSpeaking('${target.replace(/'/g,"\\'")}', document.getElementById('manualSpeak').value)">Tekshirish</button></div>`;
    return;
  }
  micBtn.classList.add('listening');
  resultBox.innerHTML = `<p style="color:var(--muted);margin-top:14px">Tinglanmoqda...</p>`;
  try{
    rec.start();
    rec.onresult = (e)=>{
      const said = e.results[0][0].transcript;
      micBtn.classList.remove('listening');
      evalSpeaking(target, said);
    };
    rec.onerror = (e)=>{
      micBtn.classList.remove('listening');
      resultBox.innerHTML = `<p style="color:var(--danger);margin-top:14px">Xatolik: ${e.error}. Mikrofonga ruxsat berilganini tekshiring.</p>`;
    };
    rec.onend = ()=> micBtn.classList.remove('listening');
  }catch(err){
    micBtn.classList.remove('listening');
    console.warn(err);
  }
}
function evalSpeaking(target, said){
  const pct = similarityPct(target, said);
  const resultBox = document.getElementById('speakResult');
  const color = pct>=80?'var(--success)':(pct>=50?'var(--accent)':'var(--danger)');
  logSkillScore('speaking', pct);
  resultBox.innerHTML = `
    <div class="result-box" style="background:var(--surface-2)">
      <div class="score-ring" style="border:6px solid ${color};color:${color}">${pct}%</div>
      <p style="margin-top:10px"><b>Siz aytdingiz:</b> "${escapeHtml(said)}"</p>
      <p><b>Kerakli ibora:</b> "${escapeHtml(target)}"</p>
      ${pct<80?`<p style="color:var(--danger);margin-top:6px">Talaffuzni yaxshilash uchun qayta urinib ko'ring. Har bir so'zni sekin va aniq talaffuz qiling.</p>`:`<p style="color:var(--success);margin-top:6px">Ajoyib talaffuz! 🎉</p>`}
    </div>`;
  if(pct>=70) addXP(8,'Speaking mashqi');
}

function playDialogue(lines){
  let i=0;
  function next(){
    if(i>=lines.length) return;
    const text = lines[i].replace(/^[A-Z]:\s*/,'');
    const u = new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.92;
    u.onend = ()=>{ i++; next(); };
    window.speechSynthesis.speak(u);
  }
  if(!('speechSynthesis' in window)){ showToast('Audio bu brauzerda ishlamaydi'); return; }
  window.speechSynthesis.cancel();
  next();
}

function checkWriting(id){
  const t = WRITING_TASKS.find(x=>x.id===id);
  const text = document.getElementById('wtxt_'+id).value.trim();
  const resDiv = document.getElementById('wres_'+id);
  if(text.length < 10){
    resDiv.innerHTML = `<p style="color:var(--danger);font-size:13px">Iltimos, kamida bir necha gap yozing.</p>`;
    return;
  }
  // Lightweight heuristic check: keyword coverage + basic spelling patterns + sentence count
  const lower = text.toLowerCase();
  const foundKw = t.keywords.filter(k=>lower.includes(k));
  const sentences = text.split(/[.!?]+/).filter(s=>s.trim().length>0);
  const words = text.split(/\s+/).filter(Boolean);
  const capIssues = sentences.filter(s=>{ const tr=s.trim(); return tr && tr[0] !== tr[0].toUpperCase(); }).length;
  let score = 40;
  score += Math.min(30, foundKw.length*10);
  score += Math.min(20, sentences.length*5);
  score -= capIssues*8;
  score = Math.max(10, Math.min(100, score));
  logSkillScore('writing', score);
  STATE.completedLessons['write_'+id] = true;
  addXP(10, 'Writing mashqi');
  saveState();
  resDiv.innerHTML = `
    <div class="result-box" style="background:var(--surface-2)">
      <p><b>Taxminiy ball: ${score}%</b></p>
      <p style="font-size:13px;color:var(--muted)">So'zlar soni: ${words.length} · Gaplar soni: ${sentences.length}</p>
      ${capIssues>0?`<p style="font-size:13px;color:var(--danger)">⚠️ ${capIssues} ta gap katta harf bilan boshlanmagan.</p>`:''}
      ${foundKw.length<t.keywords.length?`<p style="font-size:13px;color:var(--accent)">💡 Quyidagi so'zlarni ishlatishga harakat qiling: ${t.keywords.filter(k=>!foundKw.includes(k)).join(', ')}</p>`:'<p style="font-size:13px;color:var(--success)">Barcha tavsiya etilgan so\'zlar ishlatildi!</p>'}
    </div>`;
}

function appendChatMsg(role, text, save=true){
  const win = document.getElementById('chatWindow');
  const div = document.createElement('div');
  div.className = 'msg '+(role==='user'?'user':'bot');
  div.textContent = text;

function quickChat(text){ document.getElementById('chatInput').value = text; sendChat(); }
function sendChat(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  appendChatMsg('user', text);
  input.value='';
  setTimeout(()=>{ appendChatMsg('bot', aiTeacherReply(text)); }, 250);
}
function aiTeacherReply(msg){
  const m = msg.toLowerCase();
  // 1) Check if asking about a grammar topic
  const gramHit = GRAMMAR.find(g => m.includes(g.title.toLowerCase().split(' (')[0].split(':')[0].trim().split(' ')[0].toLowerCase()) || g.title.toLowerCase().includes(m.replace(/nima\??/,'').trim()));
  for(const g of GRAMMAR){
    const key = g.title.toLowerCase();
    if(m.includes(key.split('(')[0].trim()) || key.includes(m.replace(/[^a-z ]/gi,'').trim())){
      return `📐 ${g.title}: ${g.explain} Misol: "${g.examples[0][0]}" — ${g.examples[0][1]}`;
    }
  }
  // 2) Check vocabulary lookup: "X nima degani" or plain english word
  const cleaned = m.replace(/nima degani\??/,'').replace(/[?.!]/g,'').trim();
  let word = VOCAB.find(v=>v.en.toLowerCase()===cleaned || m.includes(v.en.toLowerCase()) );
  if(!word){
    // maybe they typed an uzbek word
    word = VOCAB.find(v=>v.uz.toLowerCase()===cleaned);
  }
  if(word){
    return `📚 "${word.en}" — ${word.uz}. Misol: "${word.ex}" (${word.exUz})`;
  }
  // 3) Simple grammar error correction pattern (e.g. "I go to school yesterday")
  if(/yesterday|last (week|year|night)|ago/.test(m) && /\b(go|eat|see|play|work|come|do|make)\b/.test(m)){
    return "🔍 Men bir xatoni sezdim: 'yesterday' kabi o'tmish vaqt so'zlari bilan Present Simple emas, balki Past Simple ishlatiladi. Masalan: 'go' → 'went'. To'g'ri: 'I went to school yesterday.'";
  }
  if(/\bi is\b/.test(m)){ return "🔍 Xato: 'I' bilan 'am' ishlatiladi, 'is' emas. To'g'ri: 'I am...'"; }
  if(/\bhe are\b|\bshe are\b/.test(m)){ return "🔍 Xato: He/She bilan 'is' ishlatiladi, 'are' emas. To'g'ri: 'He is...' / 'She is...'"; }
  // 4) Generic encouragement / fallback restricted to English learning
  const fallback = [
    "Bu qiziq savol! Iltimos, aniqroq grammatik mavzu (masalan 'Present Continuous') yoki so'z nomini yozing, men tushuntiraman.",
    "Men faqat ingliz tili bo'yicha yordam beraman 🎓. Grammatika mavzusi, so'z tarjimasi yoki yozgan gapingizni yuboring.",
    "Ajoyib urinish! Menga aniq bir so'z yoki gap yuborsangiz, xatolarini tahlil qilib beraman.",
  ];
  return fallback[Math.floor(Math.random()*fallback.length)];
}

PAGE_RENDERERS.flashcards = function(main){

function getDueFlashcards(){
  const now = Date.now();
  return VOCAB.filter(w=>{

    return sr && sr.nextReview <= now;
  });
}
function renderFlashcard(main){
  main = main || document.getElementById('mainContent');
  const queue = window._fcQueue;
  if(window._fcIdx >= queue.length){
    main.innerHTML = `<div class="empty-state"><div class="ic">🎉</div><p>Barcha kartalar takrorlandi! Keyinroq qayting.</p>
      <button class="btn btn-primary" style="margin-top:10px" onclick="navigate('flashcards')">Yana boshlash</button></div>`;
    return;
  }
  const w = queue[window._fcIdx];
  main.innerHTML = `

    <div class="flash-stage">
      <div class="flash-card" id="flashCardEl" onclick="this.classList.toggle('flipped')">
        <div class="flash-face flash-front">

        </div>
        <div class="flash-face flash-back">
          <div class="big">${w.uz}</div>
          <p style="font-size:13px">${w.ex}</p>
        </div>
      </div>
    </div>

      <button class="btn btn-danger" onclick="answerFlashcard('${w.id}', false)">😕 Bilmadim</button>
      <button class="btn btn-ghost" onclick="speak('${w.en.replace(/'/g,"\\'")}')">🔊</button>
      <button class="btn" style="background:var(--success-soft);color:var(--success)" onclick="answerFlashcard('${w.id}', true)">😊 Bildim</button>
    </div>
  `;
}
function answerFlashcard(wordId, knew){
  let sr = STATE.flashcardSR[wordId] || {interval:1, ease:2.3, reps:0};
  if(knew){
    sr.reps += 1;
    sr.interval = Math.round(sr.interval * sr.ease);
    sr.ease = Math.min(3, sr.ease + 0.1);
    markWordLearned(wordId);
  } else {
    sr.reps = 0;
    sr.interval = 1;
    sr.ease = Math.max(1.3, sr.ease - 0.2);
  }
  sr.nextReview = Date.now() + sr.interval*24*60*60*1000;
  STATE.flashcardSR[wordId] = sr;
  saveState();
  window._fcIdx++;
  renderFlashcard();
}

function renderPronScreen(main){
  main = main || document.getElementById('mainContent');
  const w = window._pronQueue[window._pronIdx % window._pronQueue.length];
  main.innerHTML = `
    <div class="card" style="text-align:center;padding:32px">
      <p style="color:var(--muted);font-size:13px;font-weight:700">SO'ZNI TALAFFUZ QILING</p>

      <p style="color:var(--muted);font-family:var(--font-mono)">/${w.ipa}/</p>

      <div class="mic-btn" id="pronMic" onclick="checkPronunciation('${w.en.replace(/'/g,"\\'")}')">🎤</div>
      <div id="pronResult"></div>
      <button class="btn btn-outline" style="margin-top:16px" onclick="window._pronIdx++;renderPronScreen()">Keyingi so'z →</button>
    </div>`;
}
function checkPronunciation(target){
  const rec = getRecognition();
  const mic = document.getElementById('pronMic');
  const resBox = document.getElementById('pronResult');
  if(!rec){
    resBox.innerHTML = `<p style="color:var(--danger);margin-top:10px">Ovoz tanish qo'llab-quvvatlanmaydi. Chrome brauzeridan foydalaning.</p>`;
    return;
  }
  mic.classList.add('listening');
  try{
    rec.start();
    rec.onresult = (e)=>{
      const said = e.results[0][0].transcript;
      mic.classList.remove('listening');
      const pct = similarityPct(target, said);
      const color = pct>=80?'var(--success)':(pct>=50?'var(--accent)':'var(--danger)');
      const targetLetters = target.toLowerCase().split('');
      const saidLetters = said.toLowerCase().split('');
      let diffHtml = '';
      targetLetters.forEach((ch,i)=>{
        const match = saidLetters[i]===ch;
        diffHtml += `<span style="color:${match?'var(--success)':'var(--danger)'};font-weight:700">${ch}</span>`;
      });
      logSkillScore('speaking', pct);
      resBox.innerHTML = `
        <div class="result-box" style="background:var(--surface-2)">
          <div class="score-ring" style="border:6px solid ${color};color:${color}">${pct}%</div>
          <p style="margin-top:10px;font-family:var(--font-mono);font-size:18px">${diffHtml}</p>
          <p style="font-size:13px;color:var(--muted);margin-top:6px">Siz aytdingiz: "${escapeHtml(said)}"</p>
          ${pct<80?'<p style="color:var(--danger);font-size:13px;margin-top:6px">Qizil harflar noto\'g\'ri talaffuz qilingan tovushlarni bildiradi. Qayta urinib ko\'ring.</p>':'<p style="color:var(--success);font-size:13px;margin-top:6px">Ajoyib! 🎉</p>'}
        </div>`;
      if(pct>=70) addXP(5,'Pronunciation mashqi');
    };
    rec.onerror = ()=>{ mic.classList.remove('listening'); resBox.innerHTML = '<p style="color:var(--danger)">Xatolik yuz berdi, qayta urinib ko\'ring.</p>'; };
    rec.onend = ()=> mic.classList.remove('listening');
  }catch(err){ mic.classList.remove('listening'); console.warn(err); }
}

/* Hangman */
function playHangman(){
  const w = shuffleArr(VOCAB)[0];
  window._hmWord = w.en.toLowerCase();
  window._hmGuessed = new Set();
  window._hmWrong = 0;
  window._hmMax = 6;
  window._hmWordData = w;
  renderHangman();
}
function renderHangman(){
  const main = document.getElementById('mainContent');
  const word = window._hmWord;
  const guessed = window._hmGuessed;
  const display = word.split('').map(ch=> ch===' ' ? ' ' : (guessed.has(ch)?ch:'_'));
  const lost = window._hmWrong >= window._hmMax;
  const won = word.split('').every(ch=> ch===' ' || guessed.has(ch));
  const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
  main.innerHTML = `
    <div class="card" style="text-align:center">
      <p style="color:var(--muted);font-size:13px">Kategoriya: ${CATEGORY_META[window._hmWordData.cat].label}</p>
      <p style="margin:10px 0">Xato: ${window._hmWrong}/${window._hmMax}</p>
      <div class="hangman-word">${display.map(c=>`<span>${c}</span>`).join('')}</div>
      <div class="kbd-row">
        ${alphabet.map(l=>{
          let cls='kbd-key';
          if(guessed.has(l)) cls += word.includes(l) ? ' used-good':' used-bad';
          return `<button class="${cls}" ${guessed.has(l)||lost||won?'disabled':''} onclick="hangmanGuess('${l}')">${l}</button>`;
        }).join('')}
      </div>
      ${won?'<p style="color:var(--success);font-weight:700;margin-top:14px">🎉 G\'alaba! So\'z: '+word+'</p>':''}
      ${lost?'<p style="color:var(--danger);font-weight:700;margin-top:14px">😢 Yutqazdingiz. So\'z: '+word+'</p>':''}
      ${(won||lost)?'<button class="btn btn-primary" style="margin-top:10px" onclick="playHangman()">Yana o\'ynash</button>':''}
    </div>`;
  if(won && !window._hmRewarded){ addXP(10,'Hangman g\'alabasi'); window._hmRewarded = true; }
}
function hangmanGuess(letter){
  window._hmGuessed.add(letter);
  if(!window._hmWord.includes(letter)) window._hmWrong++;
  window._hmRewarded = false;
  renderHangman();
}

/* Memory Game */
function playMemory(){
  const words = shuffleArr(VOCAB).slice(0,8);
  let tiles = [];
  words.forEach(w=>{ tiles.push({key:w.id,text:w.en,type:'en'}); tiles.push({key:w.id,text:w.uz,type:'uz'}); });
  tiles = shuffleArr(tiles);
  window._memTiles = tiles;
  window._memRevealed = [];
  window._memMatched = new Set();
  renderMemory();
}
function renderMemory(){
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="card">
      <p style="text-align:center;color:var(--muted);font-size:13px;margin-bottom:10px">Juftlarni toping: inglizcha so'z + tarjimasi</p>
      <div class="memory-grid" id="memGrid">
        ${window._memTiles.map((t,i)=>{
          const revealed = window._memRevealed.includes(i);
          const matched = window._memMatched.has(i);
          return `<div class="memory-tile ${revealed||matched?'revealed':''} ${matched?'matched':''}" onclick="memPick(${i})">${revealed||matched?t.text:'?'}</div>`;
        }).join('')}
      </div>
    </div>`;
}
function memPick(i){
  if(window._memMatched.has(i) || window._memRevealed.includes(i)) return;
  if(window._memRevealed.length>=2) return;
  window._memRevealed.push(i);
  renderMemory();
  if(window._memRevealed.length===2){
    const [a,b] = window._memRevealed;
    const ta = window._memTiles[a], tb = window._memTiles[b];
    if(ta.key===tb.key && ta.type!==tb.type){
      window._memMatched.add(a); window._memMatched.add(b);
      window._memRevealed = [];
      setTimeout(renderMemory, 300);
      if(window._memMatched.size === window._memTiles.length){ addXP(15,'Memory Game g\'alabasi'); setTimeout(()=>showToast('🎉 Barcha juftlar topildi!'),350); }
    } else {
      setTimeout(()=>{ window._memRevealed=[]; renderMemory(); }, 800);
    }
  }
}

/* Speed Quiz */
function playSpeedQuiz(){
  window._sqScore = 0;
  window._sqTimeLeft = 30;
  window._sqActive = true;
  nextSpeedQuestion();
  window._sqTimer = setInterval(()=>{
    window._sqTimeLeft--;
    const timerEl = document.getElementById('sqTimer');
    if(timerEl) timerEl.textContent = window._sqTimeLeft;
    if(window._sqTimeLeft<=0){ endSpeedQuiz(); }
  }, 1000);
}
function nextSpeedQuestion(){
  if(!window._sqActive) return;
  const w = shuffleArr(VOCAB)[0];
  const wrongs = shuffleArr(VOCAB.filter(v=>v.id!==w.id)).slice(0,3).map(v=>v.uz);
  const options = shuffleArr([w.uz, ...wrongs]);
  window._sqCurrent = {w, options, correct: options.indexOf(w.uz)};
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="card" style="text-align:center">
      <div style="display:flex;justify-content:space-between;font-family:var(--font-mono);font-weight:700">
        <span>⏱️ <span id="sqTimer">${window._sqTimeLeft}</span>s</span><span>Ball: ${window._sqScore}</span>
      </div>
      <h3 style="font-family:var(--font-display);font-size:24px;margin:16px 0">${w.en}</h3>
      <div id="sqOpts">${options.map((o,i)=>`<button class="quiz-opt" onclick="sqAnswer(${i})">${o}</button>`).join('')}</div>
    </div>`;
}
function sqAnswer(i){
  if(i===window._sqCurrent.correct) window._sqScore++;
  nextSpeedQuestion();
}
function endSpeedQuiz(){
  window._sqActive = false;
  clearInterval(window._sqTimer);
  addXP(window._sqScore, 'Speed Quiz');
  const main = document.getElementById('mainContent');
  main.innerHTML = `<div class="card" style="text-align:center;padding:40px"><div style="font-size:44px">⚡</div><h2 style="font-family:var(--font-display);margin:10px 0">Vaqt tugadi!</h2><p style="font-size:30px;font-weight:800;font-family:var(--font-mono);color:var(--primary)">${window._sqScore} ball</p><button class="btn btn-primary" style="margin-top:14px" onclick="navigate('games')">Orqaga</button></div>`;
}

  const avg = {};
  skills.forEach(s=>{
    const arr = STATE.skillScores[s] || [];
    avg[s] = arr.length ? Math.round(arr.reduce((a,b)=>a+b.pct,0)/arr.length) : null;
  });
  const scored = skills.filter(s=>avg[s]!==null);
  let weakest = null, strongest = null;
  if(scored.length){
    weakest = scored.reduce((a,b)=> avg[a]<=avg[b]?a:b);
    strongest = scored.reduce((a,b)=> avg[a]>=avg[b]?a:b);
  }
  const skillLabels = {speaking:'Speaking 🎤',listening:'Listening 🎧',grammar:'Grammar 📐',vocabulary:'Vocabulary 📚',reading:'Reading 📖',writing:'Writing ✍️'};
  const recMap = {speaking:'speaking', listening:'listening', grammar:'grammar', vocabulary:'vocabulary', reading:'reading', writing:'writing'};

  main.innerHTML = `
    <div class="card" style="margin-bottom:18px">
      <p style="color:var(--muted);font-size:13px">Bu tahlil sizning testlar va mashqlardagi natijalaringiz asosida avtomatik hisoblanadi (offline, lokal algoritm).</p>
    </div>
    <div class="grid grid-3" id="analysisGrid"></div>
    <div class="section-title">🧠 Xulosa va tavsiya</div>
    <div class="card">
      ${scored.length===0 ? `<p style="color:var(--muted)">Hali yetarli ma'lumot yo'q. Testlar va mashqlarni bajaring — tahlil avtomatik shakllanadi.</p>` : `
        <p>💪 Sizning eng kuchli tomoningiz: <b style="color:var(--success)">${skillLabels[strongest]}</b> (${avg[strongest]}%)</p>
        <p style="margin-top:6px">⚠️ Ko'proq e'tibor talab qiladigan soha: <b style="color:var(--danger)">${skillLabels[weakest]}</b> (${avg[weakest]}%)</p>
        <button class="btn btn-primary" style="margin-top:14px" onclick="navigate('${recMap[weakest]==='vocabulary'?'vocabulary':(recMap[weakest]==='grammar'?'grammar':recMap[weakest])}')">${skillLabels[weakest]} bo'yicha mashq qilish →</button>
      `}
    </div>
  `;
  document.getElementById('analysisGrid').innerHTML = skills.map(s=>{
    const val = avg[s];
    const pct = val===null?0:val;
    const color = val===null?'var(--muted)':(pct>=70?'var(--success)':(pct>=40?'var(--accent)':'var(--danger)'));
    return `<div class="card stat-card">
      <div class="top"><span class="lbl">${skillLabels[s]}</span></div>
      <b style="color:${color}">${val===null?'—':pct+'%'}</b>
      <div class="progress-bar"><i style="width:${pct}%;background:${color}"></i></div>
    </div>`;
  }).join('');
};

/* ==========================================================================
   APP INIT
   ========================================================================== */
function init(){
  applyTheme();
  renderNav();
  updateHeaderStats();
  touchStreak();
  navigate('dashboard');

  window.addEventListener('online', updateHeaderStats);
  window.addEventListener('offline', updateHeaderStats);
  window.addEventListener('resize', ()=>{
    // redraw charts responsively if visible
    if(currentPage==='dashboard'){ drawBarChart('weeklyChart', last7DaysData()); drawBarChart('monthlyChart', last30DaysData()); }
    if(currentPage==='statistics'){ drawBarChart('statDaily', last7DaysData()); drawBarChart('statMonthly', last30DaysData()); drawBarChart('statYearly', yearlyXpData()); }
  });

  // Global safety net: prevent any uncaught error from breaking the whole app silently
  window.addEventListener('error', (e)=>{ console.error('Global error caught:', e.error || e.message); });
  window.addEventListener('unhandledrejection', (e)=>{ console.error('Unhandled promise rejection:', e.reason); });

  saveState();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
